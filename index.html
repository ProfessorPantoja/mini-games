<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Games — Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #05060f;
      --cyan: #00f0ff;
      --magenta: #ff2bd6;
      --muted: #8a96b8;
      --white: #eef6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Rajdhani, system-ui, sans-serif;
      color: var(--white);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(0, 240, 255, 0.12), transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(255, 43, 214, 0.1), transparent 45%),
        var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 40px;
    }
    .eyebrow {
      font-family: Orbitron, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--cyan);
      margin-bottom: 12px;
    }
    h1 {
      font-family: Orbitron, sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 8px;
    }
    h1 span {
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 36px;
      text-align: center;
    }
    .grid {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }
    .card {
      --accent: #00f0ff;
      --accent-2: #8b7cff;
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: 16px;
      padding: 18px 18px 20px;
      background: rgba(8, 12, 28, 0.78);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0.85;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--accent) 70%, white 10%);
      box-shadow:
        0 16px 40px rgba(0, 0, 0, 0.4),
        0 0 32px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    .card.live .badge {
      background: rgba(125, 255, 107, 0.15);
      color: #7dff6b;
      border-color: rgba(125, 255, 107, 0.35);
    }
    .card.soon {
      opacity: 0.55;
      pointer-events: none;
      border-style: dashed;
      --accent: #8a96b8;
      --accent-2: #5a6480;
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), transparent 45%),
        linear-gradient(145deg, color-mix(in srgb, var(--accent) 35%, #0a1020), color-mix(in srgb, var(--accent-2) 28%, #080c18));
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 8px 20px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .icon svg {
      width: 32px;
      height: 32px;
      display: block;
    }
    .badge {
      display: inline-block;
      font-family: Orbitron, sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(0, 240, 255, 0.3);
      color: var(--cyan);
      white-space: nowrap;
    }
    .card h2 {
      font-family: Orbitron, sans-serif;
      font-size: 1.08rem;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      color: var(--white);
    }
    .card p {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }
    .card .cta {
      margin-top: 16px;
      font-family: Orbitron, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      color: var(--accent);
    }

    /* Paletas por jogo */
    .card.theme-nave     { --accent: #00f0ff; --accent-2: #4d7cff; }
    .card.theme-boss     { --accent: #ff5d7a; --accent-2: #ff9f43; }
    .card.theme-breakout { --accent: #56d6ff; --accent-2: #8b7cff; }
    .card.theme-match    { --accent: #ff6bcb; --accent-2: #ffc857; }
    .card.theme-estoura  { --accent: #7dffb3; --accent-2: #56d6ff; }
    .card.theme-pendulo  { --accent: #ffc857; --accent-2: #ff6bcb; }
    .card.theme-gelatina { --accent: #7dffb3; --accent-2: #9b7cff; }
    .card.theme-domino   { --accent: #ffc857; --accent-2: #56d6ff; }
    .card.theme-gravidade{ --accent: #8b7cff; --accent-2: #56d6ff; }
    .card.theme-drive    { --accent: #00f0ff; --accent-2: #ff2bd6; }
    .card.theme-horda    { --accent: #ff5a1f; --accent-2: #c41e3a; }
    .card.theme-soon     { --accent: #8a96b8; --accent-2: #5a6480; }

    footer {
      margin-top: auto;
      padding-top: 48px;
      font-family: Orbitron, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(138, 150, 184, 0.5);
    }
  </style>
</head>
<body>
  <p class="eyebrow">ARCADE PORTAL</p>
  <h1>MINI <span>GAMES</span></h1>
  <p class="sub">Coleção de joguinhos HTML5 · mais em breve</p>

  <div class="grid" id="games-grid" aria-live="polite"></div>

  <footer>MINI GAMES · HTML5</footer>

  <script src="/games.js"></script>
  <script>
    (function () {
      var grid = document.getElementById("games-grid");
      var catalog = window.GAMES_CATALOG || [];
      var icons = window.GAME_ICONS || {};

      // Só o que está active:true entra no portal
      var visible = catalog.filter(function (g) { return g.active; });

      if (!visible.length) {
        grid.innerHTML = '<p class="sub">Nenhum jogo ativo no catálogo.</p>';
        return;
      }

      grid.innerHTML = visible.map(function (g) {
        var isLive = g.status === "live" && g.path;
        var badge = isLive ? "JOGÁVEL" : "EM BREVE";
        var statusClass = isLive ? "live" : "soon";
        var theme = "theme-" + (g.theme || "soon");
        var iconHtml = icons[g.icon] || icons.soon || "";
        var cta = isLive ? '<div class="cta">JOGAR →</div>' : "";
        var inner =
          '<div class="card-top">' +
            '<div class="icon" aria-hidden="true">' + iconHtml + '</div>' +
            '<span class="badge">' + badge + '</span>' +
          '</div>' +
          '<h2>' + g.title + '</h2>' +
          '<p>' + g.desc + '</p>' +
          cta;

        if (isLive) {
          return '<a class="card ' + statusClass + ' ' + theme + '" href="' + g.path + '" data-game-id="' + g.id + '">' + inner + '</a>';
        }
        return '<div class="card ' + statusClass + ' ' + theme + '" data-game-id="' + g.id + '">' + inner + '</div>';
      }).join("");
    })();
  </script>
</body>
</html>
